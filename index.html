<script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
<script>
  const priceEl = document.getElementById('price');
  const rsiEl = document.getElementById('rsi');
  const signalBadgeEl = document.getElementById('signalBadge');
  const fearValueEl = document.getElementById('fearValue');
  const fearLabelEl = document.getElementById('fearLabel');
  const meterFillEl = document.getElementById('meterFill');
  const historyBodyEl = document.getElementById('historyBody');

  const historyRows = [];

  // Chart setup
  const chartContainer = document.getElementById('chart');
  const chart = LightweightCharts.createChart(chartContainer, {
    layout: { background: { color: '#0b1223' }, textColor: '#cbd5e1' },
    grid: { vertLines: { color: '#1f2937' }, horzLines: { color: '#1f2937' } },
    width: chartContainer.clientWidth,
    height: chartContainer.clientHeight,
    rightPriceScale: { borderColor: '#334155' },
    timeScale: { borderColor: '#334155', timeVisible: true, secondsVisible: false }
  });
  const candleSeries = chart.addCandlestickSeries({
    upColor: '#22c55e', downColor: '#ef4444',
    borderUpColor: '#22c55e', borderDownColor: '#ef4444',
    wickUpColor: '#22c55e', wickDownColor: '#ef4444'
  });

  window.addEventListener('resize', () => {
    chart.applyOptions({ width: chartContainer.clientWidth, height: chartContainer.clientHeight });
  });

  function calculateRSI(closes, period = 14) {
    if (closes.length <= period) return null;
    let gains = 0, losses = 0;
    for (let i = 1; i <= period; i++) {
      const diff = closes[i] - closes[i - 1];
      if (diff >= 0) gains += diff; else losses += Math.abs(diff);
    }
    let avgGain = gains / period;
    let avgLoss = losses / period;
    for (let i = period + 1; i < closes.length; i++) {
      const diff = closes[i] - closes[i - 1];
      const gain = diff > 0 ? diff : 0;
      const loss = diff < 0 ? Math.abs(diff) : 0;
      avgGain = (avgGain * (period - 1) + gain) / period;
      avgLoss = (avgLoss * (period - 1) + loss) / period;
    }
    if (avgLoss === 0) return 100;
    const rs = avgGain / avgLoss;
    return 100 - (100 / (1 + rs));
  }

  function getSignalFromRSI(rsi) {
    if (rsi < 30) return 'BUY';
    if (rsi > 70) return 'SELL';
    return 'HOLD';
  }

  function applySignalBadge(signal) {
    signalBadgeEl.textContent = signal;
    signalBadgeEl.classList.remove('buy', 'sell', 'hold');
    signalBadgeEl.classList.add(signal.toLowerCase());
  }

  function fearLabel(value) {
    const v = Number(value);
    if (v <= 24) return '😱 Extreme Fear';
    if (v <= 49) return '😟 Fear';
    if (v <= 74) return '😊 Greed';
    return '🤑 Extreme Greed';
  }

  function addHistoryRow(timeText, price, rsi) {
    const signal = getSignalFromRSI(rsi);
    historyRows.unshift({ timeText, price, rsi, signal });
    if (historyRows.length > 6) historyRows.pop();

    historyBodyEl.innerHTML = historyRows.map(row => `
      <tr>
        <td>${row.timeText}</td>
        <td>$${row.price.toLocaleString(undefined, {maximumFractionDigits:0})}</td>
        <td>${row.rsi.toFixed(1)}</td>
      </tr>
    `).join('');
  }

  // Coinbase candles (public, usually CORS-friendly)
  async function fetchBTCData() {
    // 30m granularity is not supported by Coinbase, so we use 1h candles
    const end = new Date();
    const start = new Date(end.getTime() - 200 * 60 * 60 * 1000); // 200 hours
    const url = `https://api.exchange.coinbase.com/products/BTC-USD/candles?granularity=3600&start=${start.toISOString()}&end=${end.toISOString()}`;
    const res = await fetch(url);
    if (!res.ok) throw new Error('Failed to fetch BTC candles');
    const arr = await res.json();

    // Coinbase candle format: [time, low, high, open, close, volume]
    const candles = arr.map(c => ({
      time: c[0],
      low: Number(c[1]),
      high: Number(c[2]),
      open: Number(c[3]),
      close: Number(c[4])
    })).sort((a, b) => a.time - b.time);

    return candles;
  }

  async function fetchFearGreed() {
    const target = encodeURIComponent('https://api.alternative.me/fng/?limit=1');
    const proxyUrl = `https://api.allorigins.win/get?url=${target}`;
    const res = await fetch(proxyUrl);
    if (!res.ok) throw new Error('Failed to fetch fear & greed');
    const wrapped = await res.json();
    const parsed = JSON.parse(wrapped.contents);
    return Number(parsed?.data?.[0]?.value ?? 50);
  }

  async function refreshDashboard() {
    try {
      const [candles, fg] = await Promise.all([fetchBTCData(), fetchFearGreed()]);
      candleSeries.setData(candles);
      chart.timeScale().fitContent();

      const closes = candles.map(c => c.close);
      const latestPrice = closes[closes.length - 1];
      const rsi = calculateRSI(closes, 14);
      const signal = rsi !== null ? getSignalFromRSI(rsi) : 'HOLD';

      priceEl.textContent = `$${latestPrice.toLocaleString(undefined, { maximumFractionDigits: 0 })}`;
      rsiEl.textContent = rsi !== null ? rsi.toFixed(1) : '-';
      applySignalBadge(signal);

      fearValueEl.textContent = fg;
      fearLabelEl.textContent = fearLabel(fg);
      meterFillEl.style.width = `${Math.max(0, Math.min(100, fg))}%`;

      if (rsi !== null) {
        const now = new Date();
        addHistoryRow(now.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}), latestPrice, rsi);
      }
    } catch (err) {
      console.error(err);
      fearLabelEl.textContent = 'Data load failed (API/CORS).';
    }
  }

  refreshDashboard();
  setInterval(refreshDashboard, 30 * 60 * 1000);
</script>
